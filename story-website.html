<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ጥንቸልና ኤሊ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;500;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #FFF4DD;
    --field: #8FBF5C;
    --field-deep: #5E8F3A;
    --cream: #FFFDF6;
    --gold: #F2A93B;
    --coral: #F2705C;
    --shell: #4F8A5B;
    --text: #3A2E1F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: linear-gradient(180deg, #FFF4DD 0%, #F7E4B0 100%);
    font-family: 'Noto Sans Ethiopic', sans-serif;
    overflow: hidden;
  }
  .stage {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* Cover */
  .cover {
    text-align: center;
    max-width: 480px;
  }
  .cover .eyebrow {
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--field-deep);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .cover h1 {
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 700;
    color: var(--text);
    margin: 14px 0 8px;
    line-height: 1.3;
  }
  .cover p {
    color: rgba(58,46,31,0.7);
    font-size: 16px;
    margin-bottom: 32px;
  }
  .mascots {
    width: 200px;
    height: 120px;
    margin: 0 auto 20px;
  }
  .start-btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--cream);
    background: var(--coral);
    border: none;
    padding: 14px 36px;
    border-radius: 100px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .start-btn:hover { background: #E85A48; transform: translateY(-2px); }
  .start-btn:focus-visible { outline: 3px solid var(--text); outline-offset: 3px; }

  /* Book */
  .book-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 780px;
  }
  .book-wrap.active { display: flex; }
  .page-card {
    background: var(--cream);
    border-radius: 20px;
    width: 100%;
    padding: 32px 28px 26px;
    position: relative;
    box-shadow: 0 24px 60px rgba(94,143,58,0.25);
  }
  .page-card::before {
    content: "";
    position: absolute;
    top: 18px;
    right: 18px;
    width: 26px;
    height: 26px;
    background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.06) 50%);
    border-radius: 0 0 4px 0;
  }
  .scene {
    width: 100%;
    height: 260px;
    border-radius: 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .page-text {
    font-size: 22px;
    line-height: 1.9;
    color: var(--text);
    text-align: center;
    max-width: 560px;
    margin: 0 auto;
  }
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .nav-btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: rgba(58,46,31,0.08);
    border: 1.5px solid rgba(58,46,31,0.18);
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(58,46,31,0.14); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
  .dots {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(58,46,31,0.18);
    transition: background 0.2s ease;
  }
  .dot.active { background: var(--coral); }
</style>
</head>
<body>

<div class="stage">
  <div class="cover" id="cover">
    <div class="eyebrow">የልጆች ታሪክ</div>
    <svg class="mascots" viewBox="0 0 200 120">
      <ellipse cx="150" cy="95" rx="35" ry="10" fill="rgba(94,143,58,0.15)"/>
      <ellipse cx="45" cy="98" rx="35" ry="10" fill="rgba(94,143,58,0.15)"/>
      <g transform="translate(15,55)">
        <ellipse cx="35" cy="30" rx="28" ry="20" fill="#4F8A5B"/>
        <ellipse cx="35" cy="26" rx="22" ry="15" fill="#6BAE78"/>
        <circle cx="60" cy="18" r="10" fill="#4F8A5B"/>
        <circle cx="64" cy="16" r="1.8" fill="#241B3A"/>
        <ellipse cx="12" cy="42" rx="6" ry="8" fill="#4F8A5B"/>
        <ellipse cx="55" cy="45" rx="6" ry="8" fill="#4F8A5B"/>
      </g>
      <g transform="translate(115,20)">
        <ellipse cx="35" cy="55" rx="20" ry="24" fill="#FBEFDD"/>
        <circle cx="35" cy="20" r="16" fill="#FBEFDD"/>
        <ellipse cx="24" cy="4" rx="5" ry="14" fill="#FBEFDD" transform="rotate(-15 24 4)"/>
        <ellipse cx="46" cy="4" rx="5" ry="14" fill="#FBEFDD" transform="rotate(15 46 4)"/>
        <circle cx="30" cy="18" r="2" fill="#241B3A"/>
        <circle cx="40" cy="18" r="2" fill="#241B3A"/>
        <ellipse cx="35" cy="24" rx="3" ry="2" fill="#F2705C"/>
      </g>
    </svg>
    <h1>ጥንቸልና ኤሊ</h1>
    <p>ትዕቢተኛ ጥንቸል እና ትዕግስተኛ ኤሊ በሩጫ ውድድር ተፎካከሩ። ማን አሸነፈ?</p>
    <button class="start-btn" onclick="startStory()">ታሪኩን ጀምር</button>
  </div>

  <div class="book-wrap" id="bookWrap">
    <div class="page-card">
      <div class="scene" id="scene"></div>
      <div class="page-text" id="pageText"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">ወደኋላ</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="nextBtn" onclick="changePage(1)">ቀጣይ</button>
    </div>
  </div>
</div>

<script>
  const pages = [
    { text: "ጥንቸል በፍጥነት ሮጣ ትታወቅ ነበር። ኤሊ ግን ቀስ ብላ ትሄድ ነበር።", scene: "start" },
    { text: "ጥንቸል 'ከእኔ ጋር ትሮጫለሽ?' ብላ ኤሊን ጠየቀቻት። ኤሊም 'እሺ' አለች።", scene: "start" },
    { text: "ጥንቸል በፍጥነት ሮጣ ቀደመች፣ ደክሟት ዛፍ ስር ተኛች።", scene: "sleep" },
    { text: "ኤሊ ግን ቀስ እያለች መሮጧን ቀጠለች፣ አላቆመችም።", scene: "race" },
    { text: "ጥንቸል ስትነቃ ኤሊ የመጨረሻውን መስመር ደርሳ ነበር። ኤሊ አሸነፈች!", scene: "finish" },
    { text: "ትምህርቱ፦ ቀስ በቀስ በትዕግስት መሄድ ያሸንፋል።", scene: "finish" }
  ];

  const scenes = {
    start: `<svg width="100%" height="100%" viewBox="0 0 400 150"><rect width="400" height="150" fill="#8FBF5C"/><rect x="0" y="0" width="400" height="35" fill="#FFF4DD"/><line x1="0" y1="115" x2="400" y2="115" stroke="#FFFDF6" stroke-width="3" stroke-dasharray="10 8"/><circle cx="90" cy="95" r="14" fill="#FBEFDD"/><ellipse cx="270" cy="105" rx="20" ry="14" fill="#4F8A5B"/></svg>`,
    sleep: `<svg width="100%" height="100%" viewBox="0 0 400 150"><rect width="400" height="150" fill="#F7E4B0"/><ellipse cx="120" cy="130" rx="60" ry="12" fill="#8FBF5C"/><rect x="105" y="40" width="14" height="70" fill="#8A6642"/><circle cx="112" cy="35" r="30" fill="#6BAE78"/><ellipse cx="260" cy="118" rx="26" ry="14" fill="#FBEFDD"/><text x="290" y="90" font-size="20" fill="#F2A93B">Z z</text></svg>`,
    race: `<svg width="100%" height="100%" viewBox="0 0 400 150"><rect width="400" height="150" fill="#8FBF5C"/><line x1="0" y1="115" x2="400" y2="115" stroke="#FFFDF6" stroke-width="3" stroke-dasharray="10 8"/><ellipse cx="200" cy="105" rx="22" ry="15" fill="#4F8A5B"/><ellipse cx="200" cy="100" rx="17" ry="11" fill="#6BAE78"/></svg>`,
    finish: `<svg width="100%" height="100%" viewBox="0 0 400 150"><rect width="400" height="150" fill="#8FBF5C"/><line x1="330" y1="20" x2="330" y2="130" stroke="#3A2E1F" stroke-width="4"/><rect x="330" y="20" width="40" height="20" fill="#F2705C"/><rect x="330" y="40" width="40" height="20" fill="#FFFDF6"/><ellipse cx="150" cy="105" rx="22" ry="15" fill="#4F8A5B"/><ellipse cx="150" cy="100" rx="17" ry="11" fill="#6BAE78"/></svg>`
  };

  let current = 0;

  function startStory() {
    document.getElementById('cover').style.display = 'none';
    document.getElementById('bookWrap').classList.add('active');
    renderPage();
  }

  function renderDots() {
    const dots = document.getElementById('dots');
    dots.innerHTML = '';
    pages.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === current ? ' active' : '');
      dots.appendChild(d);
    });
  }

  function renderPage() {
    const p = pages[current];
    document.getElementById('pageText').textContent = p.text;
    document.getElementById('scene').innerHTML = scenes[p.scene];
    document.getElementById('prevBtn').disabled = current === 0;
    document.getElementById('nextBtn').disabled = current === pages.length - 1;
    renderDots();
  }

  function changePage(delta) {
    const next = current + delta;
    if (next < 0 || next >= pages.length) return;
    current = next;
    renderPage();
  }
</script>

</body>
</html>
